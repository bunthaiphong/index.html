<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LogicPro | Admin</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { background: #020617; color: white; font-family: sans-serif; padding: 20px; }
        .panel { background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #334155; margin-bottom: 20px; }
        .row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #334155; }
        .btn-green { background: #10b981; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; }
        .btn-blue { background: #3b82f6; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; }
        table { width: 100%; margin-top: 15px; border-collapse: collapse; }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid #334155; }
        .status-won { color: #10b981; } .status-lost { color: #ef4444; }
    </style>
</head>
<body>
    <h1>ADMIN DASHBOARD</h1>

    <div class="panel">
        <h2 id="admRound">Round: #--</h2>
        <button class="btn-blue" onclick="startNewRound()">Start New 7-Min Round</button>
    </div>

    <div class="panel">
        <h3>Settle Round Result</h3>
        <button class="btn-green" onclick="settleGame('1')">Result 1</button>
        <button class="btn-green" onclick="settleGame('2')">Result 2</button>
        <button class="btn-green" onclick="settleGame('3')">Result 3</button>
    </div>

    <div class="panel">
        <h3>User Approvals</h3>
        <div id="userList"></div>
    </div>

    <div class="panel">
        <div style="display:flex; justify-content: space-between;">
            <h3>Bet History</h3>
            <button class="btn-green" onclick="exportToExcel()">📥 Export Excel</button>
        </div>
        <table>
            <thead><tr><th>Round</th><th>Email</th><th>Code</th><th>Amount</th><th>Status</th></tr></thead>
            <tbody id="betList"></tbody>
        </table>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyC00tFeeA-JTOq-D4pu7_emPAzU7s-yPsg", authDomain: "logicpro-5b78a.firebaseapp.com", projectId: "logicpro-5b78a", storageBucket: "logicpro-5b78a.firebasestorage.app", messagingSenderId: "126796584893", appId: "1:126796584893:web:ac43e619bf73a76542e4d4" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Sync Admin Round
        db.collection("system").doc("gameStatus").onSnapshot(doc => {
            document.getElementById('admRound').innerText = "Round: #" + doc.data().currentRound;
        });

        async function startNewRound() {
            const ref = db.collection("system").doc("gameStatus");
            const snap = await ref.get();
            await ref.update({
                currentRound: (snap.data().currentRound || 0) + 1,
                startTime: firebase.firestore.FieldValue.serverTimestamp(),
                duration: 420
            });
        }

        async function settleGame(winNum) {
            const bets = await db.collection("bets").where("status", "==", "pending").get();
            bets.forEach(async d => {
                const b = d.data();
                const isWin = b.m.includes(winNum);
                const userRef = db.collection("users").doc(b.uid);
                const uSnap = await userRef.get();
                const uData = uSnap.data();

                if (isWin) {
                    await d.ref.update({ status: "won" });
                    await userRef.update({ wallet: uData.wallet + (b.l * 2) });
                } else {
                    await d.ref.update({ status: "lost" });
                    await userRef.update({ totalLoss: (uData.totalLoss || 0) + b.l });
                }
            });
            alert("Settled!");
        }

        db.collection("users").where("role","==","player").onSnapshot(snap => {
            const l = document.getElementById('userList'); l.innerHTML = "";
            snap.forEach(d => {
                const u = d.data();
                l.innerHTML += `<div class="row"><span>${u.email} (Loss: ${u.totalLoss})</span>
                ${u.isApproved ? '✅' : `<button onclick="db.collection('users').doc('${d.id}').update({isApproved:true})">Approve</button>`}</div>`;
            });
        });

        db.collection("bets").orderBy("time","desc").limit(20).onSnapshot(snap => {
            const bList = document.getElementById('betList'); bList.innerHTML = "";
            snap.forEach(d => {
                const b = d.data();
                bList.innerHTML += `<tr><td>${b.round}</td><td>${b.email}</td><td>${b.m}</td><td>${b.l}</td><td class="status-${b.status}">${b.status}</td></tr>`;
            });
        });

        async function exportToExcel() {
            const snap = await db.collection("bets").get();
            const data = snap.docs.map(d => d.data());
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "History");
            XLSX.writeFile(wb, "LogicPro_History.xlsx");
        }
    </script>
</body>
</html>
