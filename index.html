<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogicPro | Access</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 30px; border-radius: 20px; width: 340px; text-align: center; border: 1px solid #334155; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: #3b82f6; border: none; color: white; font-weight: bold; border-radius: 10px; cursor: pointer; margin-top: 10px; }
        .toggle { font-size: 0.8rem; color: #94a3b8; margin-top: 15px; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <h2 id="title">Login</h2>
        <input type="text" id="nickname" placeholder="Nickname (Register only)" style="display:none;">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="pass" placeholder="Password">
        <button onclick="handleAuth()">Submit</button>
        <p class="toggle" onclick="toggleMode()" id="toggleTxt">Need an account? Register</p>
        <p id="msg" style="color:#fbbf24; font-size:0.8rem; margin-top:10px;"></p>
    </div>

    <script>
        // Your actual config integrated
        const firebaseConfig = {
            apiKey: "AIzaSyC00tFeeA-JTOq-D4pu7_emPAzU7s-yPsg",
            authDomain: "logicpro-5b78a.firebaseapp.com",
            projectId: "logicpro-5b78a",
            storageBucket: "logicpro-5b78a.firebasestorage.app",
            messagingSenderId: "126796584893",
            appId: "1:126796584893:web:ac43e619bf73a76542e4d4"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        let isLogin = true;

        function toggleMode() {
            isLogin = !isLogin;
            document.getElementById('title').innerText = isLogin ? "Login" : "Register";
            document.getElementById('nickname').style.display = isLogin ? "none" : "block";
            document.getElementById('toggleTxt').innerText = isLogin ? "Have an account? Login" : "Need an account? Register";
        }

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            const nickname = document.getElementById('nickname').value;
            const msg = document.getElementById('msg');
            msg.innerText = "Working...";
            
            try {
                if (!isLogin) {
                    if(!nickname) throw new Error("Nickname is required for registration!");
                    const res = await auth.createUserWithEmailAndPassword(email, pass);
                    await db.collection("users").doc(res.user.uid).set({ 
                        uid: res.user.uid, 
                        nickname: nickname, 
                        email: email, 
                        wallet: 0, 
                        isApproved: false, 
                        role: 'player' 
                    });
                    msg.innerText = "Registered successfully! Please contact Admin for approval.";
                } else {
                    const res = await auth.signInWithEmailAndPassword(email, pass);
                    const userDoc = await db.collection("users").doc(res.user.uid).get();
                    
                    if (!userDoc.exists) throw new Error("User record not found!");
                    
                    const data = userDoc.data();
                    if (data.role === 'admin') {
                        window.location.href = "admin.html";
                    } else if (data.isApproved) {
                        window.location.href = "app.html";
                    } else {
                        msg.innerText = "Account pending Admin approval.";
                        auth.signOut();
                    }
                }
            } catch (e) { 
                msg.innerText = e.message; 
            }
        }
    </script>
</body>
</html>
