<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogicPro | Play</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; padding: 20px; text-align: center; }
        .card { background: #1e293b; padding: 20px; border-radius: 15px; border: 1px solid #334155; margin-bottom: 15px; }
        .balance { font-size: 2.5rem; color: #fbbf24; font-weight: bold; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #0f172a; color: white; border: 1px solid #334155; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #3b82f6; border: none; color: white; font-weight: bold; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <p>CURRENT WALLET</p>
        <div id="bal" class="balance">Loading...</div>
    </div>

    <div class="card">
        <input type="text" id="mCode" placeholder="Method Code (e.g. K1)">
        <input type="number" id="mLuy" placeholder="Bet Amount">
        <button onclick="placeBet()">PLACE BET</button>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyC00tFeeA-JTOq-D4pu7_emPAzU7s-yPsg", authDomain: "logicpro-5b78a.firebaseapp.com", projectId: "logicpro-5b78a", storageBucket: "logicpro-5b78a.firebasestorage.app", messagingSenderId: "126796584893", appId: "1:126796584893:web:ac43e619bf73a76542e4d4" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        auth.onAuthStateChanged(user => {
            if (!user) window.location.href = "index.html";
            db.collection("users").doc(user.uid).onSnapshot(doc => {
                document.getElementById('bal').innerText = doc.data().wallet;
            });
        });

        async function placeBet() {
            const m = document.getElementById('mCode').value.toUpperCase();
            const l = parseFloat(document.getElementById('mLuy').value);
            const user = auth.currentUser;
            
            const userRef = db.collection("users").doc(user.uid);
            const snap = await userRef.get();
            const bal = snap.data().wallet;

            if (l > bal) return alert("Not enough money!");

            await userRef.update({ wallet: bal - l });
            await db.collection("bets").add({ uid: user.uid, m, l, status: "pending", time: Date.now() });
            alert("Bet Placed!");
        }
    </script>
</body>
</html>
