<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogicPro | Play</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; padding: 15px; max-width: 500px; margin: auto; }
        .card { background: #1e293b; padding: 20px; border-radius: 15px; border: 1px solid #334155; margin-bottom: 15px; text-align: center; }
        .timer { font-size: 2.5rem; color: #ef4444; font-family: monospace; font-weight: bold; }
        .balance { font-size: 2rem; color: #fbbf24; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #0f172a; color: white; border: 1px solid #334155; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #3b82f6; border: none; color: white; font-weight: bold; border-radius: 8px; cursor: pointer; }
        table { width: 100%; font-size: 0.8rem; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 8px; border-bottom: 1px solid #334155; text-align: left; }
        .win { color: #10b981; } .loss { color: #ef4444; }
    </style>
</head>
<body>
    <div class="card" style="border-top: 4px solid #3b82f6;">
        <h2 id="roundNum">Round: #--</h2>
        <div id="timerDisplay" class="timer">07:00</div>
    </div>

    <div class="card">
        <p>WALLET BALANCE</p>
        <div id="bal" class="balance">0.00</div>
    </div>

    <div class="card">
        <input type="text" id="mCode" placeholder="Method (K1, 1>2, T1, -123)">
        <input type="number" id="mLuy" placeholder="Bet Amount">
        <button onclick="placeBet()">PLACE BET</button>
    </div>

    <div class="card">
        <h3>My History</h3>
        <table>
            <thead><tr><th>Round</th><th>Method</th><th>Amount</th><th>Status</th></tr></thead>
            <tbody id="myHistory"></tbody>
        </table>
    </div>

    <script>
        const firebaseConfig = { apiKey: "YOUR_API_KEY", authDomain: "YOUR_PROJECT.firebaseapp.com", projectId: "YOUR_PROJECT", storageBucket: "YOUR_PROJECT.appspot.com", messagingSenderId: "ID", appId: "APP_ID" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const VALID_METHODS = ['K1','K2','K3','K4','C1','C2','C3','C4','T1','T2','T3','T4','1>2','2>1','1>3','3>1','1>4','4>1','2>3','3>2','2>4','4>2','3>4','4>3','12','13','14','23','24','34','-12','-21','-13','-31','-14','-41','-23','-32','-24','-42','-34','-43','-123','-124','-134','-213','-214','-234','-312','-314','-324','-412','-413','-423'];
        let currentRoundID = 0;

        auth.onAuthStateChanged(user => {
            if (!user) window.location.href = "index.html";
            db.collection("users").doc(user.uid).onSnapshot(doc => { document.getElementById('bal').innerText = doc.data().wallet.toLocaleString(); });
            loadHistory(user.uid);
        });

        db.collection("system").doc("gameStatus").onSnapshot(doc => {
            const data = doc.data();
            currentRoundID = data.currentRound;
            document.getElementById('roundNum').innerText = "Round: #" + currentRoundID;
            startTimer(data.startTime, data.duration);
        });

        function startTimer(start, duration) {
            if (!start) return;
            setInterval(() => {
                const diff = Math.floor((Date.now() - start.toDate().getTime()) / 1000);
                const rem = duration - diff;
                const timerLabel = document.getElementById('timerDisplay');
                if (rem <= 0) { timerLabel.innerText = "WAITING..."; }
                else { 
                    const m = Math.floor(rem / 60); const s = rem % 60;
                    timerLabel.innerText = `${m}:${s.toString().padStart(2, '0')}`;
                }
            }, 1000);
        }

        async function placeBet() {
            const m = document.getElementById('mCode').value.toUpperCase().trim();
            const l = parseFloat(document.getElementById('mLuy').value);
            if (!VALID_METHODS.includes(m)) return alert("❌ Invalid Method Code!");
            if (document.getElementById('timerDisplay').innerText === "WAITING...") return alert("Round Closed!");

            const userRef = db.collection("users").doc(auth.currentUser.uid);
            const snap = await userRef.get();
            if (l > snap.data().wallet) return alert("Insufficient Balance!");

            await userRef.update({ wallet: snap.data().wallet - l });
            await db.collection("bets").add({ uid: auth.currentUser.uid, email: snap.data().email, m, l, round: currentRoundID, status: "pending", time: Date.now() });
            alert("✅ Bet Placed!");
        }

        function loadHistory(uid) {
            db.collection("bets").where("uid", "==", uid).orderBy("time", "desc").limit(10).onSnapshot(snap => {
                const h = document.getElementById('myHistory'); h.innerHTML = "";
                snap.forEach(d => { const b = d.data(); h.innerHTML += `<tr><td>#${b.round}</td><td>${b.m}</td><td>${b.l}</td><td class="${b.status}">${b.status.toUpperCase()}</td></tr>`; });
            });
        }
    </script>
</body>
</html>
