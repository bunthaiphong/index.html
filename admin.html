<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogicPro | Admin Panel</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; padding: 20px; }
        .panel { background: #1e293b; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #334155; }
        button { padding: 10px 15px; cursor: pointer; border-radius: 5px; border: none; font-weight: bold; margin: 5px; }
        .btn-approve { background: #10b981; color: white; }
        .btn-result { background: #3b82f6; color: white; width: 100px; height: 50px; font-size: 1.2rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #334155; }
    </style>
</head>
<body>

    <h1>Admin Control Tower</h1>

    <div class="panel">
        <h3>Current Round Result</h3>
        <div style="display: flex; gap: 10px;">
            <button class="btn-result" onclick="settleGame('1')">1</button>
            <button class="btn-result" onclick="settleGame('2')">2</button>
            <button class="btn-result" onclick="settleGame('3')">3</button>
            <button class="btn-result" onclick="settleGame('4')">4</button>
        </div>
    </div>

    <div class="panel">
        <h3>Pending Approvals</h3>
        <table>
            <thead><tr><th>Nickname</th><th>Email</th><th>Action</th></tr></thead>
            <tbody id="userList"></tbody>
        </table>
    </div>

    <script>
        // YOUR CONFIG (Must be the same in all 3 files)
        const firebaseConfig = {
            apiKey: "AIzaSyC00tFeeA-JTOq-D4pu7_emPAzU7s-yPsg",
            authDomain: "logicpro-5b78a.firebaseapp.com",
            projectId: "logicpro-5b78a",
            storageBucket: "logicpro-5b78a.firebasestorage.app",
            messagingSenderId: "126796584893",
            appId: "1:126796584893:web:ac43e619bf73a76542e4d4"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Load Pending Users
        db.collection("users").where("isApproved", "==", false).onSnapshot(snap => {
            const list = document.getElementById('userList');
            list.innerHTML = "";
            snap.forEach(doc => {
                const u = doc.data();
                list.innerHTML += `<tr>
                    <td>${u.nickname || 'N/A'}</td>
                    <td>${u.email}</td>
                    <td><button class="btn-approve" onclick="approveUser('${doc.id}')">Approve</button></td>
                </tr>`;
            });
        });

        async function approveUser(uid) {
            await db.collection("users").doc(uid).update({ isApproved: true, wallet: 1000 }); // Giving 1000 start bonus
            alert("User Approved!");
        }

        // VBA Translation Logic
        function translateMethod(method) {
            let m = method.toString().toUpperCase().trim();
            if (m.startsWith('K')) return parseInt(m.replace('K', ''));
            if (m.startsWith('C')) return parseInt(m.replace('C', '-'));
            if (m.startsWith('T')) { let n = m.replace('T', ''); return parseInt(n + n); }
            if (m.includes('>')) { let p = m.split('>'); return parseInt("9" + p[0] + p[1]); }
            return parseInt(m);
        }

        // Payout Logic (Ordered pairs 912, 921, etc.)
        function calculatePayout(result, methodStr, luy) {
            let res = parseInt(result);
            let m = translateMethod(methodStr);
            let l = parseFloat(luy);
            let am = Math.abs(m);
            if (m >= 900) { 
                let d1 = Math.floor((m - 900) / 10), d2 = (m - 900) % 10;
                return (res === d1) ? l * 2 * 0.95 : (res === d2 ? 0 : -l);
            }
            // Basic K/C logic
            const rules = [[1,1,3*0.95,-1],[2,2,3*0.95,-1],[3,3,3*0.95,-1],[4,4,3*0.95,-1],[-1,1,-3,0.95],[-2,2,-3,0.95],[-3,3,-3,0.95],[-4,4,-3,0.95]];
            for (let r of rules) { if (m === r[0]) return (res === r[1]) ? l * r[2] : l * r[3]; }
            return 0;
        }

        async function settleGame(winNum) {
            const snap = await db.collection("bets").where("status", "==", "pending").get();
            snap.forEach(async d => {
                const b = d.data();
                const profit = calculatePayout(winNum, b.m, b.l);
                const userRef = db.collection("users").doc(b.uid);
                const uSnap = await userRef.get();
                if (profit >= 0) {
                    await userRef.update({ wallet: uSnap.data().wallet + (b.l + profit) });
                    await d.ref.update({ status: "won" });
                } else {
                    await d.ref.update({ status: "lost" });
                }
            });
            alert("Settlement Done for Result " + winNum);
        }
    </script>
</body>
</html>
